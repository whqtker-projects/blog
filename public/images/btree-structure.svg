<svg xmlns="http://www.w3.org/2000/svg" width="320" height="130" viewBox="0 0 320 130">
  <!-- Root node -->
  <rect x="110" y="8" width="100" height="32" rx="4" fill="#f0f0f0" stroke="#555" stroke-width="1.5"/>
  <text x="160" y="29" text-anchor="middle" font-family="monospace" font-size="14" fill="#222">30</text>

  <!-- Left leaf -->
  <rect x="20" y="76" width="120" height="32" rx="4" fill="#f0f0f0" stroke="#555" stroke-width="1.5"/>
  <text x="80" y="97" text-anchor="middle" font-family="monospace" font-size="14" fill="#222">10 | 20</text>

  <!-- Right leaf -->
  <rect x="180" y="76" width="120" height="32" rx="4" fill="#f0f0f0" stroke="#555" stroke-width="1.5"/>
  <text x="240" y="97" text-anchor="middle" font-family="monospace" font-size="14" fill="#222">40 | 50</text>

  <!-- Edges -->
  <line x1="140" y1="40" x2="80"  y2="76" stroke="#555" stroke-width="1.5"/>
  <line x1="180" y1="40" x2="240" y2="76" stroke="#555" stroke-width="1.5"/>
</svg>
